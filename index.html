```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Product Catalog</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#1e40af;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.search-box{
    text-align:center;
    margin-bottom:20px;
}

.search-box input{
    width:80%;
    max-width:400px;
    padding:10px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:8px;
}

.price{
    color:green;
    font-size:20px;
    margin:10px 0;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:20px;
    background:#1e40af;
    color:white;
    margin-top:20px;
}

@media(max-width:768px){
    nav{
        flex-direction:column;
        align-items:center;
    }

    .search-box input{
        width:95%;
    }
}
</style>
</head>
<body>

<header>
    <h1>Maneesha Store</h1>
    <p>E-Commerce Product Catalog</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

<div class="search-box">
    <input type="text" id="searchInput"
    placeholder="Search products..."
    onkeyup="searchProducts()">
</div>

<div class="products" id="productContainer">

<div class="card">
    <img src="https://picsum.photos/300/220?1">
    <h3>Laptop</h3>
    <p class="price">₹45,000</p>
    <button>View Product</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/220?2">
    <h3>Smartphone</h3>
    <p class="price">₹20,000</p>
    <button>View Product</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/220?3">
    <h3>Headphones</h3>
    <p class="price">₹2,500</p>
    <button>View Product</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/220?4">
    <h3>Smart Watch</h3>
    <p class="price">₹5,000</p>
    <button>View Product</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/220?5">
    <h3>Camera</h3>
    <p class="price">₹30,000</p>
    <button>View Product</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/220?6">
    <h3>Tablet</h3>
    <p class="price">₹15,000</p>
    <button>View Product</button>
</div>

</div>
</div>

<footer>
    <p>© 2026 Maneesha Store | E-Commerce Project</p>
</footer>

<script>
function searchProducts(){
    let input =
    document.getElementById("searchInput")
    .value.toLowerCase();

    let cards =
    document.querySelectorAll(".card");

    cards.forEach(card=>{
        let name =
        card.querySelector("h3")
        .textContent.toLowerCase();

        if(name.includes(input)){
            card.style.display="block";
        }
        else{
            card.style.display="none";
        }
    });
}
</script>

</body>
</html>
```
